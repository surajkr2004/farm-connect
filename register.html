<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - FarmConnect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#15803d;--green-light:#22c55e;--green-dark:#14532d;
  --bg:#f0fdf4;--surface:#fff;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--error:#ef4444;--shadow:0 20px 60px rgba(21,128,61,.12)
}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);font-family:'DM Sans',sans-serif;padding:30px 16px;
  background-image:radial-gradient(ellipse at 30% 70%,rgba(34,197,94,.08) 0%,transparent 60%)}
.card{background:var(--surface);border-radius:24px;padding:40px;width:100%;
  max-width:460px;box-shadow:var(--shadow);border:1px solid rgba(34,197,94,.1);
  animation:rise .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes rise{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.brand{text-align:center;margin-bottom:28px}
.brand-icon{font-size:36px;display:block;margin-bottom:6px}
.brand h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--green-dark)}
.brand p{color:var(--muted);font-size:13px;margin-top:3px}

.role-tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.role-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;
  cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s}
.role-tab.active{background:var(--green);color:white}

.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input,select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);
  background:#fafafa;transition:all .2s;outline:none}
input:focus,select:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(21,128,61,.08)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:13px;border:none;border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green-light));color:white;margin-top:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(21,128,61,.3)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:10px;display:none}
.msg.error{background:#fef2f2;color:var(--error);border:1px solid #fecaca;display:block}
.msg.success{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0;display:block}
.links{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.links a{color:var(--green);font-weight:500;text-decoration:none}
.section-label{font-size:12px;color:var(--muted);font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="brand-icon">📝</span>
    <h1>FarmConnect</h1>
    <p>Create your account</p>
  </div>

  <div class="role-tabs">
    <button class="role-tab active" id="tabFarmer" onclick="switchRole('farmer')">👨‍🌾 Farmer</button>
    <button class="role-tab" id="tabBuyer" onclick="switchRole('buyer')">🛒 Buyer</button>
  </div>

  <!-- FARMER FIELDS -->
  <div id="farmerFields">
    <div class="form-group"><label>Full Name</label>
      <input id="f_name" placeholder="Enter full name"></div>
    <div class="row">
      <div class="form-group"><label>Email</label>
        <input id="f_email" type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Mobile</label>
        <input id="f_phone" placeholder="10-digit mobile"></div>
    </div>
    <div class="row">
      <div class="form-group"><label>Village</label>
        <input id="f_village" placeholder="Village name"></div>
      <div class="form-group"><label>State</label>
        <select id="f_state">
          <option value="">Select State</option>
          <option>Bihar</option><option>UP</option><option>Punjab</option>
          <option>Haryana</option><option>Rajasthan</option><option>MP</option>
          <option>Gujarat</option><option>Maharashtra</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="section-label">Security (for password recovery)</div>
    <div class="form-group"><label>Security Question</label>
      <select id="f_question">
        <option value="">Select a question</option>
        <option>What is the name of your village?</option>
        <option>What was your first crop?</option>
        <option>What is your mother's maiden name?</option>
        <option>What was the name of your first pet?</option>
        <option>What is the name of your primary school?</option>
      </select>
    </div>
    <div class="form-group"><label>Security Answer</label>
      <input id="f_answer" placeholder="Your answer (remembered for recovery)"></div>
    <div class="row">
      <div class="form-group"><label>Password</label>
        <input id="f_pass" type="password" placeholder="Min 6 chars"></div>
      <div class="form-group"><label>Confirm</label>
        <input id="f_cpass" type="password" placeholder="Re-enter"></div>
    </div>
  </div>

  <!-- BUYER FIELDS -->
  <div id="buyerFields" style="display:none">
    <div class="form-group"><label>Full Name</label>
      <input id="b_name" placeholder="Enter full name"></div>
    <div class="row">
      <div class="form-group"><label>Email</label>
        <input id="b_email" type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Mobile</label>
        <input id="b_phone" placeholder="10-digit mobile"></div>
    </div>
    <div class="form-group"><label>Address</label>
      <input id="b_address" placeholder="City, State"></div>
    <div class="section-label">Security (for password recovery)</div>
    <div class="form-group"><label>Security Question</label>
      <select id="b_question">
        <option value="">Select a question</option>
        <option>What is your mother's maiden name?</option>
        <option>What was the name of your first pet?</option>
        <option>What is the name of your primary school?</option>
        <option>What was your childhood nickname?</option>
        <option>What city were you born in?</option>
      </select>
    </div>
    <div class="form-group"><label>Security Answer</label>
      <input id="b_answer" placeholder="Your answer (remembered for recovery)"></div>
    <div class="row">
      <div class="form-group"><label>Password</label>
        <input id="b_pass" type="password" placeholder="Min 6 chars"></div>
      <div class="form-group"><label>Confirm</label>
        <input id="b_cpass" type="password" placeholder="Re-enter"></div>
    </div>
  </div>

  <div id="regMsg" class="msg"></div>
  <button class="btn btn-primary" id="regBtn" onclick="register()">Create Account</button>

  <div class="links">
    Already have an account?
    <a id="loginLink" href="farmer-login.html">Login here</a>
    &nbsp;|&nbsp;
    <a href="index.html">← Home</a>
  </div>
</div>

<script>
const API = "http://localhost:5000";
let role = "farmer";

function switchRole(r) {
    role = r;
    document.getElementById("farmerFields").style.display = r==="farmer" ? "block" : "none";
    document.getElementById("buyerFields").style.display  = r==="buyer"  ? "block" : "none";
    document.getElementById("tabFarmer").classList.toggle("active", r==="farmer");
    document.getElementById("tabBuyer").classList.toggle("active", r==="buyer");
    document.getElementById("loginLink").href = r==="farmer" ? "farmer-login.html" : "buyer-login.html";
    document.getElementById("regMsg").className = "msg";
    document.getElementById("regMsg").textContent = "";
}

function showMsg(text, type) {
    const el = document.getElementById("regMsg");
    el.textContent = text;
    el.className = "msg " + type;
}

function v(id) { return document.getElementById(id).value.trim(); }

async function register() {
    const btn = document.getElementById("regBtn");

    if (role === "farmer") {
        const name=v("f_name"),email=v("f_email"),phone=v("f_phone"),
              village=v("f_village"),state=v("f_state"),
              question=v("f_question"),answer=v("f_answer"),
              pass=v("f_pass"),cpass=v("f_cpass");

        if (!name||!email||!phone||!pass) return showMsg("Please fill all required fields.","error");
        if (!question||!answer) return showMsg("Please set a security question and answer for account recovery.","error");
        if (pass.length < 6) return showMsg("Password must be at least 6 characters.","error");
        if (pass !== cpass) return showMsg("Passwords do not match.","error");

        btn.disabled = true; btn.innerText = "Registering...";
        try {
            const res = await fetch(API+"/api/farmer/register",{
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({name,email,phone,password:pass,village,state,security_question:question,security_answer:answer})
            });
            const data = await res.json();
            if (data.success) {
                showMsg("✅ Registered successfully! Redirecting to login...","success");
                setTimeout(()=>window.location.href="farmer-login.html", 1800);
            } else {
                showMsg(data.message || "Registration failed.","error");
            }
        } catch { showMsg("Cannot connect to server.","error"); }
        finally { btn.disabled=false; btn.innerText="Create Account"; }

    } else {
        const name=v("b_name"),email=v("b_email"),phone=v("b_phone"),
              address=v("b_address"),question=v("b_question"),
              answer=v("b_answer"),pass=v("b_pass"),cpass=v("b_cpass");

        if (!name||!email||!phone||!pass) return showMsg("Please fill all required fields.","error");
        if (!question||!answer) return showMsg("Please set a security question and answer for account recovery.","error");
        if (pass.length < 6) return showMsg("Password must be at least 6 characters.","error");
        if (pass !== cpass) return showMsg("Passwords do not match.","error");

        btn.disabled = true; btn.innerText = "Registering...";
        try {
            const res = await fetch(API+"/api/buyer/register",{
                method:"POST", headers:{"Content-Type":"application/json"},
                body: JSON.stringify({name,email,phone,password:pass,address,security_question:question,security_answer:answer})
            });
            const data = await res.json();
            if (data.success) {
                showMsg("✅ Registered successfully! Redirecting to login...","success");
                setTimeout(()=>window.location.href="buyer-login.html", 1800);
            } else {
                showMsg(data.message || "Registration failed.","error");
            }
        } catch { showMsg("Cannot connect to server.","error"); }
        finally { btn.disabled=false; btn.innerText="Create Account"; }
    }
}
</script>
</body>
</html>
