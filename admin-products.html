<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin | Products</title>
<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
h1{margin:20px}
table{width:96%;margin:20px auto;border-collapse:collapse;background:#fff}
th,td{padding:12px;border-bottom:1px solid #eee}
th{background:#2563eb;color:white}
.badge{padding:5px 10px;border-radius:14px;font-size:12px}
.pending{background:#facc15}
.live{background:#22c55e;color:#052e16}
.rejected{background:#ef4444;color:#450a0a}
.hidden{background:#64748b;color:white}
button{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<h1>Products Management</h1>

<table id="productsTable">
<tr>
  <th>Product ID</th>
  <th>Product</th>
  <th>Farmer</th>
  <th>Status</th>
  <th>Quality</th>
  <th>Price</th>
  <th>Action</th>
</tr>
</table>

<script src="data.js"></script>

<script>
const DBLS = JSON.parse(localStorage.getItem("DB"));
const table = document.getElementById("productsTable");

DBLS.products.forEach(p=>{
  table.innerHTML += `
  <tr>
    <td>${p.id}</td>
    <td>${p.name}</td>
    <td>${p.farmerName}<br><small>${p.farmerId}</small></td>
    <td><span class="badge ${p.status.toLowerCase()}">${p.status}</span></td>
    <td>⭐ ${p.quality}</td>
    <td>₹${p.price}</td>
    <td>
      <button onclick="openProduct('${p.id}')">View</button>
    </td>
  </tr>`;
});

function openProduct(pid){
  window.location.href = "admin-product.html?pid=" + pid;
}

</script>

</body>
</html>
